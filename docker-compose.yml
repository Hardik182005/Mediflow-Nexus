version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mediflow-db
    environment:
      POSTGRES_DB: mediflow_nexus
      POSTGRES_USER: mediflow
      POSTGRES_PASSWORD: mediflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediflow -d mediflow_nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediflow-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediflow-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://mediflow:mediflow123@postgres:5432/mediflow_nexus
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
