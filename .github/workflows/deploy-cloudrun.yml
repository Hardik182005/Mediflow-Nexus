name: Deploy to Cloud Run

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PROJECT_ID: mediflow-nexus-2026
  REGION: us-central1
  SERVICE_NAME: mediflow-nexus
  IMAGE: gcr.io/mediflow-nexus-2026/mediflow-nexus-frontend

jobs:
  deploy:
    name: Build & Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        working-directory: frontend
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -t "${{ env.IMAGE }}:${{ github.sha }}" \
            -t "${{ env.IMAGE }}:latest" \
            .

      - name: Push to Google Container Registry
        run: |
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --platform managed \
            --region "${{ env.REGION }}" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300 \
            --set-env-vars "\
              NODE_ENV=production,\
              NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }},\
              NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }},\
              GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
              ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }},\
              RESEND_API_KEY=${{ secrets.RESEND_API_KEY }},\
              GCP_PROJECT_ID=${{ env.PROJECT_ID }},\
              GCP_LOCATION=${{ env.REGION }}" \
            --quiet

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --platform managed \
            --region "${{ env.REGION }}" \
            --format "value(status.url)")
          echo "✅ Deployed to: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      - name: Comment deployment URL
        if: github.event_name == 'push'
        run: echo "🚀 Frontend live at ${{ env.SERVICE_URL }}"
